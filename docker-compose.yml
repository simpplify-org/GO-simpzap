services:
  dev-go-simpzap-container:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dev-go-simpzap-container
    env_file:
      - .env.dev
    environment:
      - DOCKER_BRIDGE_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3372:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  homolog-go-simpzap-container:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homolog-go-simpzap-container
    env_file:
      - .env.homolog
    environment:
      - DOCKER_BRIDGE_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "6672:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  prod-go-simpzap-container:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prod-go-simpzap-container
    env_file:
      - .env.prod
    environment:
      - DOCKER_BRIDGE_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9972:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  zap-client:
    build:
      context: .
      dockerfile: client.Dockerfile
    image: zap-client:latest